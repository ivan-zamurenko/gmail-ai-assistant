<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gmail AI Assistant</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <header class="header">
    <img src="../../assets/icon48.png" alt="" class="header__icon" />
    <h1 class="header__title">Gmail AI Assistant</h1>
  </header>

  <main class="main">

    <!-- Status indicator -->
    <div class="status">
      <span class="status__dot" id="statusDot"></span>
      <span class="status__label" id="statusLabel">Idle</span>
    </div>

    <!-- Settings toggles -->
    <section class="settings">
      <label class="setting">
        <span class="setting__label">Auto-process emails</span>
        <input type="checkbox" id="autoProcess" class="setting__toggle" />
      </label>

      <label class="setting">
        <span class="setting__label">Draft mode (no auto-send)</span>
        <input type="checkbox" id="draftMode" class="setting__toggle" />
      </label>
    </section>

    <!-- Manual trigger -->
    <button class="btn btn--primary" id="runNow">Run now</button>

    <!-- Error message (hidden by default) -->
    <p class="error" id="errorMessage" hidden></p>

  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
